<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Google TPM Tracker</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body>
  <div class="container" id="app"></div>

  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-tab active" data-view="today"><span class="icon">&#x1F4CB;</span>Today</button>
    <button class="nav-tab" data-view="calendar"><span class="icon">&#x1F4C5;</span>Calendar</button>
    <button class="nav-tab" data-view="progress"><span class="icon">&#x1F4CA;</span>Progress</button>
    <button class="nav-tab" data-view="scorecard"><span class="icon">&#x1F3AF;</span>Scorecard</button>
  </nav>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
